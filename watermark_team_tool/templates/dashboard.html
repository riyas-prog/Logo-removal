<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <style>

    body{
        font-family:Arial;
        background:#111;
        color:white;
        margin:30px;
    }

    .grid{

        display:grid;

        grid-template-columns:
        repeat(auto-fill,minmax(300px,1fr));

        gap:25px;

    }

    .card{

        background:#1d1d1d;

        border-radius:12px;

        padding:20px;

    }

    img{

        width:100%;

        border-radius:10px;

    }

    button{

        width:100%;

        margin-top:15px;

        padding:10px;

        font-size:16px;

    }

    </style>

</head>

<body>

<h1>Watermark Removal Dashboard</h1>

<div class="grid">

{% for job in jobs %}

<div class="card">

{% if job.thumbnail %}
<img src="{{ url_for('static', filename='thumbnails/' + job.thumbnail) }}">
{% else %}
<div style="height:220px;background:#2b2b2b;display:flex;align-items:center;justify-content:center;border-radius:10px;">
    No Thumbnail
</div>
{% endif %}

<h3>{{ job.filename }}</h3>

<p>Status:
<b>{{ job.status }}</b></p>

<p>{{ job.width }} × {{ job.height }}</p>

<p>{{ "%.1f"|format(job.duration) }} sec</p>

<button>

Review

</button>

</div>

{% endfor %}

</div>

</body>

</html>
