<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watermark Removal</title>
<style>
:root {
    --text: #17213a;
    --muted: #64748b;
    --blue: #2588f5;
    --line: #a8d4ff;
    --panel: rgba(255, 255, 255, 0.82);
    --amber: #f59e0b;
    --red: #ef4444;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    min-height: 100%;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;

    color: var(--text);
    font-family: var(--sans);

    background:
        radial-gradient(
            circle at 5% 5%,
            rgba(255, 207, 64, 0.72) 0,
            rgba(255, 207, 64, 0.30) 11%,
            transparent 24%
        ),
        radial-gradient(
            circle at 95% 8%,
            rgba(92, 200, 255, 0.55) 0,
            rgba(92, 200, 255, 0.20) 14%,
            transparent 29%
        ),
        radial-gradient(
            circle at 3% 96%,
            rgba(41, 199, 174, 0.62) 0,
            rgba(41, 199, 174, 0.28) 16%,
            transparent 32%
        ),
        radial-gradient(
            circle at 92% 96%,
            rgba(255, 79, 91, 0.65) 0,
            rgba(255, 159, 28, 0.46) 15%,
            transparent 34%
        ),
        linear-gradient(
            135deg,
            #ffffff 0%,
            #f8fbff 45%,
            #ffffff 100%
        );

    background-attachment: fixed;
}

/* --------------------------------------------------
   ABSTRACT BACKGROUND DECORATIONS
-------------------------------------------------- */

body::before {
    content: "";
    position: fixed;
    z-index: -1;

    width: 520px;
    height: 220px;

    left: -120px;
    bottom: -70px;

    border-radius: 50% 50% 0 0;

    background:
        linear-gradient(
            135deg,
            rgba(35, 164, 255, 0.48),
            rgba(39, 210, 149, 0.46)
        );

    transform: rotate(8deg);

    filter: blur(1px);
}

body::after {
    content: "";
    position: fixed;
    z-index: -1;

    width: 540px;
    height: 250px;

    right: -130px;
    bottom: -90px;

    border-radius: 60% 50% 0 0;

    background:
        linear-gradient(
            135deg,
            rgba(255, 204, 58, 0.55),
            rgba(255, 78, 93, 0.62)
        );

    transform: rotate(-8deg);
}

/* --------------------------------------------------
   HEADER — SIGN OUT ONLY
-------------------------------------------------- */

header {
    height: 70px;

    display: flex;
    align-items: center;
    justify-content: flex-end;

    padding: 0 34px;

    background: rgba(255, 255, 255, 0.50);

    border-bottom:
        1px solid rgba(148, 163, 184, 0.25);

    backdrop-filter: blur(12px);
}

.brand {
    display: none;
}

header a {
    color: #287bdc;

    font-size: 14px;
    font-weight: 700;

    text-decoration: none;

    padding: 9px 14px;

    border-radius: 9px;

    transition:
        background 0.2s ease,
        transform 0.2s ease;
}

header a:hover {
    background: rgba(37, 136, 245, 0.10);

    transform: translateY(-1px);
}

/* --------------------------------------------------
   MAIN
-------------------------------------------------- */

main {
    width: min(100%, 1000px);

    margin: 0 auto;

    padding:
        100px 24px
        80px;
}

/* --------------------------------------------------
   UPLOAD BOX
-------------------------------------------------- */

.dropzone {
    min-height: 300px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    padding: 50px 30px;

    text-align: center;

    background:
        rgba(255, 255, 255, 0.80);

    border:
        2px dashed
        var(--line);

    border-radius: 24px;

    box-shadow:
        0 24px 60px
        rgba(45, 85, 130, 0.15);

    backdrop-filter:
        blur(18px);

    cursor: pointer;

    transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease;
}

.dropzone:hover {
    transform:
        translateY(-3px);

    border-color:
        var(--blue);

    box-shadow:
        0 30px 70px
        rgba(45, 85, 130, 0.20);
}

.dropzone.dragover {
    border-color:
        var(--blue);

    background:
        rgba(235, 246, 255, 0.94);

    transform:
        scale(1.01);
}

/* Upload icon */

.dropzone .icon {
    width: 78px;
    height: 78px;

    display: flex;
    align-items: center;
    justify-content: center;

    margin-bottom: 22px;

    border-radius: 50%;

    background:
        linear-gradient(
            135deg,
            #e9f5ff,
            #f4faff
        );

    color:
        var(--blue);

    font-family:
        Arial,
        sans-serif;

    font-size: 42px;
    font-weight: 700;

    line-height: 1;

    box-shadow:
        0 10px 25px
        rgba(37, 136, 245, 0.12);
}

.dropzone h2 {
    margin:
        0 0 12px;

    color:
        #17213a;

    font-size:
        25px;

    font-weight:
        800;

    letter-spacing:
        -0.02em;
}

.dropzone p {
    margin:
        0;

    color:
        var(--muted);

    font-size:
        15px;

    line-height:
        1.6;
}

.dropzone input[type="file"] {
    display:
        none;
}

/* --------------------------------------------------
   REMOVE OLD HOW-IT-WORKS PANEL
-------------------------------------------------- */

.how-it-works {
    display:
        none;
}

/* --------------------------------------------------
   JOBS / EMPTY STATE
-------------------------------------------------- */

.jobs {
    margin-top:
        36px;

    display:
        flex;

    flex-direction:
        column;

    gap:
        12px;
}

.empty-state {
    text-align:
        center;

    color:
        #66758c;

    font-size:
        14px;

    padding:
        26px 10px;

    font-family:
        var(--mono);

    font-weight:
        500;
}

/* --------------------------------------------------
   JOB CARDS
-------------------------------------------------- */

.job {
    background:
        rgba(255, 255, 255, 0.90);

    border:
        1px solid
        rgba(203, 213, 225, 0.75);

    border-radius:
        16px;

    padding:
        16px 20px;

    display:
        flex;

    align-items:
        center;

    gap:
        16px;

    box-shadow:
        0 12px 35px
        rgba(40, 70, 110, 0.10);

    backdrop-filter:
        blur(14px);
}

.job-icon {
    width:
        44px;

    height:
        44px;

    border-radius:
        11px;

    background:
        #eaf5ff;

    color:
        var(--blue);

    display:
        flex;

    align-items:
        center;

    justify-content:
        center;

    font-family:
        var(--mono);

    font-size:
        11px;

    font-weight:
        800;

    flex-shrink:
        0;
}

.job-info {
    flex:
        1;

    min-width:
        0;
}

.job-name {
    color:
        #17213a;

    font-size:
        14px;

    font-weight:
        700;

    white-space:
        nowrap;

    overflow:
        hidden;

    text-overflow:
        ellipsis;
}

.job-meta {
    margin-top:
        4px;

    color:
        var(--muted);

    font-family:
        var(--mono);

    font-size:
        11.5px;
}

.job-meta .method-badge {
    display:
        inline-block;

    padding:
        2px 7px;

    border-radius:
        5px;

    margin-left:
        6px;

    font-size:
        10.5px;
}

.method-badge.fast {
    background:
        rgba(34, 197, 94, 0.12);

    color:
        #15803d;
}

.method-badge.deep {
    background:
        rgba(245, 158, 11, 0.14);

    color:
        #b45309;
}

.job-status {
    font-family:
        var(--mono);

    font-size:
        11.5px;

    padding:
        6px 10px;

    border-radius:
        7px;

    flex-shrink:
        0;

    white-space:
        nowrap;
}

.status-queued {
    background:
        #f1f5f9;

    color:
        #64748b;
}

.status-processing {
    background:
        #eaf5ff;

    color:
        #1677d2;
}

.status-done {
    background:
        #eafaf0;

    color:
        #15803d;
}

.status-failed {
    background:
        #fff0f0;

    color:
        #dc2626;
}

/* --------------------------------------------------
   DOWNLOAD BUTTON
-------------------------------------------------- */

.download-btn {
    flex-shrink:
        0;

    background:
        linear-gradient(
            135deg,
            #2588f5,
            #1672d4
        );

    color:
        #ffffff;

    border:
        none;

    border-radius:
        9px;

    padding:
        10px 18px;

    font-size:
        13px;

    font-weight:
        800;

    cursor:
        pointer;

    text-decoration:
        none;

    box-shadow:
        0 8px 20px
        rgba(37, 136, 245, 0.22);
}

.download-btn:hover {
    transform:
        translateY(-1px);
}

/* --------------------------------------------------
   SPINNER
-------------------------------------------------- */

.spinner {
    width:
        12px;

    height:
        12px;

    border:
        2px solid
        rgba(37, 136, 245, 0.22);

    border-top-color:
        var(--blue);

    border-radius:
        50%;

    display:
        inline-block;

    animation:
        spin 0.7s
        linear
        infinite;

    margin-right:
        6px;

    vertical-align:
        -1px;
}

@keyframes spin {
    to {
        transform:
            rotate(360deg);
    }
}

/* --------------------------------------------------
   MOBILE
-------------------------------------------------- */

@media (max-width: 700px) {

    header {
        height:
            60px;

        padding:
            0 16px;
    }

    main {
        padding:
            60px 16px
            60px;
    }

    .dropzone {
        min-height:
            260px;

        padding:
            40px 20px;
    }

    .dropzone h2 {
        font-size:
            20px;
    }

    .dropzone p {
        font-size:
            13px;
    }

    .job {
        align-items:
            flex-start;

        flex-wrap:
            wrap;
    }
}
</style>
</head>
<body>
<header>
  <a href="/logout">Sign out</a>
</header>

<main>
  <div class="dropzone" id="dropzone">
    <div class="icon">↑</div>
    <h2>Drop videos here, or click to browse</h2>
    <p>Upload as many as you need — each one is processed and detected automatically.</p>
    <input type="file" id="fileInput" multiple accept=".mp4,.mov,.avi,.mkv,.webm">
  </div>

  <div class="jobs" id="jobs">
    <div class="empty-state" id="emptyState">No videos yet — upload something above to get started.</div>
  </div>
</main>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const jobsEl = document.getElementById('jobs');
const emptyState = document.getElementById('emptyState');
const pollers = {};

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) uploadFiles(fileInput.files);
});

function uploadFiles(files) {
  const formData = new FormData();
  for (const f of files) formData.append('videos', f);

  // Optimistic placeholder rows while the upload itself is in flight
  const tempIds = [];
  for (const f of files) {
    const tempId = 'pending-' + Math.random().toString(36).slice(2);
    tempIds.push(tempId);
    renderJob({ id: tempId, original_filename: f.name, status: 'queued', report: null }, true);
  }

  fetch('/upload', {
    method: 'POST',
    body: formData
})
.then(response => response.json())
.then(data => {

    if (data.error) {
        alert(data.error);
        return;
    }

    if (data.redirect) {
        window.location.href = data.redirect;
    }

})
.catch(error => {

    console.error(error);

    alert(
        "Upload failed. Check the terminal for the real error."
    );

});
}

function pollJob(jobId) {
  if (pollers[jobId]) return;
  const tick = () => {
    fetch('/status/' + jobId)
      .then(r => r.json())
      .then(job => {
        renderJob(job, false);
        if (job.status === 'done' || job.status === 'failed') {
          clearInterval(pollers[jobId]);
          delete pollers[jobId];
        }
      });
  };
  tick();
  pollers[jobId] = setInterval(tick, 1500);
}

function methodBadge(report) {
  if (!report || !report.detect_method) return '';
  if (report.detect_method === 'static_variance') {
    return '<span class="method-badge fast">fast scan</span>';
  }
  return '<span class="method-badge deep">deep scan</span>';
}

function statusLabel(status) {
  if (status === 'queued') return 'Queued';
  if (status === 'processing') return '<span class="spinner"></span>Processing';
  if (status === 'done') return 'Done';
  if (status === 'failed') return 'Failed';
  return status;
}

function renderJob(job, isTemp) {
  emptyState.style.display = 'none';
  let row = document.getElementById('row-' + job.id);
  if (!row) {
    row = document.createElement('div');
    row.className = 'job';
    row.id = 'row-' + job.id;
    jobsEl.prepend(row);
  }

  const statusClass = 'status-' + job.status;
  const rate = job.report && job.report.detect_rate != null
    ? Math.round(job.report.detect_rate * 100) + '% detected'
    : '';

  row.innerHTML = `
    <div class="job-icon">${(job.original_filename || '').split('.').pop().toUpperCase().slice(0,4)}</div>
    <div class="job-info">
      <div class="job-name">${escapeHtml(job.original_filename || '')}</div>
      <div class="job-meta">${job.status === 'failed' ? escapeHtml(job.error || 'Something went wrong') : (rate + methodBadge(job.report))}</div>
    </div>
<div class="job-status ${statusClass}">${statusLabel(job.status)}</div>
${job.status === 'done' ? `<a href="/download/${job.id}" class="download-btn" data-job="${job.id}">Download</a>` : ''}
`;}
document.addEventListener('click', function(e) {
    const btn = e.target.closest('.download-btn');
    if (!btn) return;

    const jobId = btn.dataset.job;

    setTimeout(() => {
        fetch(`/cleanup/${jobId}`, {
            method: 'POST'
        }).catch(console.error);
    }, 30000);
});
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
</script>
</body>
</html>
